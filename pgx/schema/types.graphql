type Material {
  mat_no: String!
  name: String!
  status: String!
  tenant_id: String
  sizes: [Size!]!
  colorways: [Colorway!]!
  material_features: [MaterialFeature!]!
}

type Size {
  id: Int!
  size_code: String!
  mat_no: String!
  name: String!
}

type Colorway {
  id: Int!
  colorway_code: String!
  mat_no: String!
  name: String!
  hex: String
}

type MaterialFeature {
  id: Int!
  mat_no: String!
  feature_name: String!
  description: String
}

type Query {
  material: Material
}
