database:
  url: "postgres://postgres:postgres@localhost:5432/morphis"
  max_connections: 10

server:
  host: "0.0.0.0"
  port: 4000

tables:
  materials:
    table: materials
    primary_key: [mat_no]
    columns:
      - name: mat_no
        type: string
        nullable: false
        unique: true
      - name: name
        type: string
        nullable: false
      - name: status
        type: string
        nullable: false
        default: "'active'"
    relations:
      - name: sizes
        type: has_many
        table: sizes
        local_field: mat_no
        foreign_field: mat_no
      - name: colorways
        type: has_many
        table: colorways
        local_field: mat_no
        foreign_field: mat_no
      - name: material_features
        type: has_many
        table: material_features
        local_field: mat_no
        foreign_field: mat_no

  sizes:
    table: sizes
    primary_key: [id]
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
      - name: size_code
        type: string
        nullable: false
      - name: mat_no
        type: string
        nullable: false
      - name: name
        type: string
        nullable: false
    relations:
      - name: material
        type: belongs_to
        table: materials
        local_field: mat_no
        foreign_field: mat_no

  colorways:
    table: colorways
    primary_key: [id]
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
      - name: colorway_code
        type: string
        nullable: false
      - name: mat_no
        type: string
        nullable: false
      - name: name
        type: string
        nullable: false
      - name: hex
        type: string
        nullable: true
    relations:
      - name: material
        type: belongs_to
        table: materials
        local_field: mat_no
        foreign_field: mat_no

  material_features:
    table: material_features
    primary_key: [id]
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
      - name: mat_no
        type: string
        nullable: false
      - name: feature_name
        type: string
        nullable: false
      - name: description
        type: string
        nullable: true
    relations:
      - name: material
        type: belongs_to
        table: materials
        local_field: mat_no
        foreign_field: mat_no
      - name: feature_attributes
        type: has_many
        table: feature_attributes
        local_field: id
        foreign_field: feature_id

  feature_attributes:
    table: feature_attributes
    primary_key: [id]
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
      - name: feature_id
        type: int
        nullable: false
      - name: attr_name
        type: string
        nullable: false
      - name: attr_value
        type: string
        nullable: false
    relations:
      - name: material_feature
        type: belongs_to
        table: material_features
        local_field: feature_id
        foreign_field: id
