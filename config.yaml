database:
  url: "postgres://postgres:postgres@localhost:5432/morphis"
  max_connections: 10

elasticsearch:
  url: "http://localhost:9200"

server:
  host: "0.0.0.0"
  port: 4000

mcp:
  enabled: true
  server_name: morphis-mcp
  server_description: "MCP server for morphis: query, search, and explore your database tables"
  prompts:
    system: "You are a database assistant for a manufacturing company.
      Use discover_tables first to learn the schema. Prefer query for exact matches
      with filters (supports __gt, __gte, __lt, __lte, __ne, __contains, __startswith,
      __endswith operators and OR conditions). Use query_by_related when you need
      to find records based on a related table's values (e.g. 'materials with feature X').
      Use get for single-record lookup by primary key.
      Use search for full-text fuzzy matching across indexed fields.
      MATERIALS is the central table — most queries start here."
    query_guidance: "Always start by calling discover_tables to learn the available
      tables, their columns (with types and prompts), relations (has_many/belongs_to
      with field mappings), and common query patterns. The discover_tables output
      includes a relations[] array showing how tables connect (e.g. materials has_many
      material_features on mat_no) and common_queries[] with example tool calls.
      Use query_by_related when you need to find records based on a related table's
      values — the relation name comes from discover_tables. Use query for direct
      table filters, search for full-text across indexes, get for primary key lookup."
  auth:
    enabled: false

tables:
  materials:
    table: materials
    primary_key: [mat_no]
    prompt: "Product catalog of raw materials used in manufacturing. Central table — most queries start here."
    common_queries:
      - description: "Find materials by feature name"
        tool: query_by_related
        params: { table: "materials", related: "material_features" }
      - description: "Search materials by name or status"
        tool: search
        params: { index: "materials_search" }
      - description: "Get materials with their sizes"
        tool: query
        params: { table: "materials" }
    columns:
      - name: mat_no
        type: string
        nullable: false
        unique: true
        prompt: "Unique material identifier (e.g. M001, M002)"
        examples: ["M001", "M002"]
      - name: name
        type: string
        nullable: false
        prompt: "Display name of the material"
        examples: ["Premium Cotton Canvas", "Merino Wool Blend"]
      - name: status
        type: string
        nullable: false
        default: "'active'"
        prompt: "Lifecycle status of the material"
        examples: ["active", "discontinued"]
      - name: tenant_id
        type: string
        nullable: true
    row_filters:
      - column: tenant_id
        from_header: X-Tenant-ID
        auto_set: true
      - type: subquery
        from_header: X-User-ID
        columns: [tenant_id]
        match_columns: [tenant_id]
        from_source: materials
        user_column: tenant_id
    relations:
      - name: sizes
        type: has_many
        table: sizes
        local_field: mat_no
        foreign_field: mat_no
      - name: colorways
        type: has_many
        table: colorways
        local_field: mat_no
        foreign_field: mat_no
      - name: material_features
        type: has_many
        table: material_features
        local_field: mat_no
        foreign_field: mat_no

  sizes:
    table: sizes
    primary_key: [id]
    prompt: "Size variants for materials (e.g. small, medium, large, numeric sizes)"
    common_queries:
      - description: "Find sizes by material code"
        tool: query
        params: { table: "sizes" }
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
        auto_increment: true
      - name: size_code
        type: string
        nullable: false
        prompt: "Size identifier code"
        examples: ["S", "M", "L", "XL", "40", "42"]
      - name: mat_no
        type: string
        nullable: false
        prompt: "References the parent material"
      - name: name
        type: string
        nullable: false
        prompt: "Human-readable size name"
        examples: ["Small", "Medium", "Large"]
    relations:
      - name: material
        type: belongs_to
        table: materials
        local_field: mat_no
        foreign_field: mat_no

  colorways:
    table: colorways
    primary_key: [id]
    prompt: "Color variants for materials with hex codes"
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
        auto_increment: true
      - name: colorway_code
        type: string
        nullable: false
        prompt: "Color identifier code"
        examples: ["CW001", "CW002"]
      - name: mat_no
        type: string
        nullable: false
        prompt: "References the parent material"
      - name: name
        type: string
        nullable: false
        prompt: "Color name"
        examples: ["Navy Blue", "Charcoal Gray", "Ivory White"]
      - name: hex
        type: string
        nullable: true
        prompt: "Hex color code"
        examples: ["#000080", "#36454F", "#FFFFF0"]
    relations:
      - name: material
        type: belongs_to
        table: materials
        local_field: mat_no
        foreign_field: mat_no

  material_features:
    table: material_features
    primary_key: [id]
    prompt: "Characteristics and attributes of materials. Use this to find materials with specific features."
    common_queries:
      - description: "Find features by material code"
        tool: query
        params: { table: "material_features" }
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
        auto_increment: true
      - name: mat_no
        type: string
        nullable: false
        prompt: "References the parent material"
      - name: feature_name
        type: string
        nullable: false
        prompt: "Name of the material characteristic"
        examples: ["Water Resistant", "Eco", "Flame Retardant", "UV Resistant"]
      - name: description
        type: string
        nullable: true
        prompt: "Detailed description of the feature"
    relations:
      - name: material
        type: belongs_to
        table: materials
        local_field: mat_no
        foreign_field: mat_no
      - name: feature_attributes
        type: has_many
        table: feature_attributes
        local_field: id
        foreign_field: feature_id

  feature_attributes:
    table: feature_attributes
    primary_key: [id]
    prompt: "Key-value attributes attached to material features (e.g. weight, thickness, certification)"
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
        auto_increment: true
      - name: feature_id
        type: int
        nullable: false
        prompt: "References the parent material_feature"
      - name: attr_name
        type: string
        nullable: false
        prompt: "Attribute key"
        examples: ["weight", "thickness", "certification", "treatment"]
      - name: attr_value
        type: string
        nullable: false
        prompt: "Attribute value"
        examples: ["200gsm", "1.5mm", "OEKO-TEX", "DWR coating"]
    relations:
      - name: material_feature
        type: belongs_to
        table: material_features
        local_field: feature_id
        foreign_field: id

  user_permissions:
    table: user_permissions
    primary_key: [id]
    columns:
      - name: id
        type: int
        nullable: false
        unique: true
        auto_increment: true
      - name: user_id
        type: string
        nullable: false
      - name: tenant_id
        type: string
        nullable: false
      - name: region
        type: string
        nullable: false

  protected_data:
    table: protected_data
    primary_key: [id]
    columns:
      - name: id
        type: string
        nullable: false
        unique: true
      - name: name
        type: string
        nullable: false
      - name: value
        type: string
        nullable: true
      - name: region
        type: string
        nullable: true
    row_filters:
      - type: subquery
        from_header: X-User-ID
        columns: [region]
        match_columns: [region]
        from_source: user_permissions
        user_column: user_id
        cache_ttl_secs: 30

search_indexes:
  - name: materials_search
    index: materials
    type: materials
    searchable_fields:
      - mat_no
      - name
      - status
    join_fields:
      - name: features
        index_field: material_features
        table: material_features
        local_field: mat_no
        foreign_field: mat_no
        searchable_fields:
          - feature_name
          - description
        join_fields:
          - name: attributes
            index_field: feature_attributes
            table: feature_attributes
            local_field: id
            foreign_field: feature_id
            searchable_fields:
              - attr_name
              - attr_value
