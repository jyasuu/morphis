<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'SF Mono','JetBrains Mono','Cascadia Code','Consolas',monospace" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-result" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="800" height="620" fill="url(#bg)" rx="12" ry="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">MCP query_by_related — Workflow</text>

  <!-- Step 1: User -->
  <rect x="60" y="55" width="160" height="56" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <text x="140" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">User</text>
  <text x="140" y="98" text-anchor="middle" font-size="11" fill="#94a3b8">opencode run "find materials</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="83" x2="280" y2="83" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="75" text-anchor="middle" font-size="10" fill="#6b7280">1</text>

  <!-- Step 2: opencode CLI -->
  <rect x="290" y="55" width="160" height="56" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
  <text x="370" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">opencode CLI</text>
  <text x="370" y="96" text-anchor="middle" font-size="11" fill="#bfdbfe">MCP client · tool call</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="83" x2="510" y2="83" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="75" text-anchor="middle" font-size="10" fill="#6b7280">2</text>

  <!-- Step 3: morphis MCP -->
  <rect x="520" y="48" width="230" height="70" rx="8" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="635" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">morphis MCP Server</text>
  <text x="635" y="90" text-anchor="middle" font-size="11" fill="#bfdbfe">POST /mcp · Streamable HTTP</text>
  <text x="635" y="108" text-anchor="middle" font-size="11" fill="#93c5fd">Axum · rmcp 1.8 · tokio</text>

  <!-- Arrow 3→4 (query_by_related) -->
  <line x1="635" y1="118" x2="635" y2="170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="650" y="148" text-anchor="middle" font-size="10" fill="#3b82f6">query_by_related</text>

  <!-- Step 4: Parse & Resolve -->
  <rect x="480" y="180" width="310" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="635" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Parse &amp; Resolve Config</text>
  <text x="635" y="220" text-anchor="middle" font-size="11" fill="#3b82f6">Look up relation → material_features</text>
  <text x="635" y="234" text-anchor="middle" font-size="11" fill="#2563eb">Build subquery: SELECT mat_no FROM ... WHERE feature_name = $1</text>

  <!-- Arrow 4→5 -->
  <path d="M 635 240 L 635 275 L 370 275 L 370 305" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="500" y="267" text-anchor="middle" font-size="10" fill="#6b7280">apply row_filters</text>

  <!-- Step 5: PostgreSQL -->
  <rect x="220" y="315" width="300" height="56" rx="8" fill="#064e3b" stroke="#047857" stroke-width="1.5"/>
  <text x="370" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PostgreSQL</text>
  <text x="370" y="356" text-anchor="middle" font-size="11" fill="#6ee7b7">sqlx · Pool&lt;Postgres&gt;</text>

  <!-- SQL callout -->
  <rect x="220" y="380" width="300" height="72" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="235" y="398" font-size="11" font-weight="600" fill="#065f46">SQL generated</text>
  <text font-size="10" fill="#047857">
    <tspan x="235" dy="17">SELECT COALESCE(json_agg(row_to_json(t)), '[]')</tspan>
    <tspan x="235" dy="14">FROM (SELECT * FROM materials WHERE mat_no IN (</tspan>
    <tspan x="235" dy="14">  SELECT mat_no FROM material_features WHERE feature_name = $1</tspan>
    <tspan x="235" dy="14">) LIMIT 50 OFFSET 0) t</tspan>
  </text>

  <!-- Arrow 5→6 (result) -->
  <line x1="370" y1="458" x2="370" y2="495" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="385" y="480" text-anchor="middle" font-size="10" fill="#22c55e">3</text>

  <!-- Step 6: JSON Response -->
  <rect x="160" y="505" width="420" height="56" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="370" y="528" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">JSON Result → opencode</text>
  <text x="370" y="546" text-anchor="middle" font-size="11" fill="#b45309">count: 2, rows: [{mat_no: M001, …}, {mat_no: M002, …}]</text>

  <!-- Arrow 6→User (final) -->
  <path d="M 160 531 L 60 531 L 60 111 L 140 111" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-result)" fill="none"/>
  <text x="95" y="523" text-anchor="middle" font-size="10" fill="#f59e0b">4</text>

  <!-- Legend -->
  <rect x="30" y="575" width="740" height="35" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="598" font-size="10" font-weight="600" fill="#64748b">Legend:</text>
  <circle cx="110" cy="596" r="5" fill="#6b7280"/><text x="120" y="599" font-size="10" fill="#64748b">1 trigger</text>
  <circle cx="185" cy="596" r="5" fill="#3b82f6"/><text x="195" y="599" font-size="10" fill="#64748b">2 tool dispatch</text>
  <circle cx="280" cy="596" r="5" fill="#22c55e"/><text x="290" y="599" font-size="10" fill="#64748b">3 return</text>
  <circle cx="355" cy="596" r="5" fill="#f59e0b"/><text x="365" y="599" font-size="10" fill="#64748b">4 present</text>
  <rect x="430" y="590" width="14" height="12" rx="3" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="450" y="600" font-size="10" fill="#64748b">SQL detail</text>
  <rect x="530" y="590" width="14" height="12" rx="3" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="550" y="600" font-size="10" fill="#64748b">Result</text>
</svg>
