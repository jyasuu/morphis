listen_addr: "0.0.0.0:9080"
upstream: "http://app:4000"
jwt_jwks_url: "http://keycloak:8080/realms/morphis/protocol/openid-connect/certs"
jwt_issuer: ""
require_auth: true
header_mappings:
  - claim: sub
    header: X-User-ID
  - claim: tenant_id
    header: X-Tenant-ID
  - claim: role
    header: X-Role
