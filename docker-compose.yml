services:
  db:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: morphis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./db/triggers.sql:/docker-entrypoint-initdb.d/04-triggers.sql

  es:
    image: elasticsearch:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: morphis_es_pass
      xpack.security.transport.ssl.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:morphis_es_pass http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  app:
    image: morphis:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MORPHIS_CONFIG: /app/config.yaml
    depends_on:
      db:
        condition: service_healthy
      es:
        condition: service_healthy
    volumes:
      - ./config.docker.yaml:/app/config.yaml

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_URL: http://localhost:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "/opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user admin --password admin >/dev/null 2>&1 && /opt/keycloak/bin/kcadm.sh get realms/morphis >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro

  auth-proxy:
    image: auth-proxy:local
    build:
      context: .
      dockerfile: auth-proxy/Dockerfile
    ports:
      - "9080:9080"
    environment:
      AUTH_PROXY_CONFIG: /app/config.yaml
    depends_on:
      app:
        condition: service_started
      keycloak:
        condition: service_healthy
    volumes:
      - ./auth-proxy/config.docker.yaml:/app/config.yaml

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

  rabbitmq-setup:
    image: rabbitmq:3-management
    depends_on:
      rabbitmq:
        condition: service_healthy
    entrypoint: ["sh", "-c", "rabbitmqadmin -H rabbitmq declare exchange name=pgx type=topic durable=true && rabbitmqadmin -H rabbitmq declare queue name=pgx-events durable=true && rabbitmqadmin -H rabbitmq declare binding source=pgx destination=pgx-events routing_key='pgx.notify' && echo 'RabbitMQ exchange and queue ready'"]
    restart: "no"

  pgx-listen:
    image: ghcr.io/jyasuu/pg_x:main
    command:
      - "listen"
      - "--channel"
      - "materials_channel"
      - "elasticsearch"
      - "--es-url"
      - "http://elastic:morphis_es_pass@es:9200"
      - "--index"
      - "materials"
      - "--id-field"
      - "mat_no"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/morphis
    volumes:
      - ./pgx/config.toml:/root/.pgx/config.toml
      - ./pgx/schema:/root/.pgx/schema
      - ./pgx/queries:/root/.pgx/queries
    depends_on:
      db:
        condition: service_healthy
      es:
        condition: service_healthy
    restart: unless-stopped

  pgx-listen-rabbitmq:
    image: ghcr.io/jyasuu/pg_x:main
    command:
      - "listen"
      - "-C"
      - "materials_channel"
      - "rabbitmq"
      - "--amqp-url"
      - "amqp://guest:guest@rabbitmq:5672/%2F"
      - "--exchange"
      - "pgx"
      - "--routing-key"
      - "pgx.notify"
      - "--mode"
      - "contract"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/morphis
    volumes:
      - ./pgx/config.toml:/root/.pgx/config.toml
      - ./pgx/schema:/root/.pgx/schema
      - ./pgx/queries:/root/.pgx/queries
    depends_on:
      db:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  pgx-consume:
    image: ghcr.io/jyasuu/pg_x:main
    command:
      - "consume"
      - "--source"
      - "rabbitmq"
      - "--amqp-url"
      - "amqp://guest:guest@rabbitmq:5672/%2F"
      - "--queue"
      - "pgx-events"
      - "--sink"
      - "elasticsearch"
      - "--es-url"
      - "http://elastic:morphis_es_pass@es:9200"
      - "--index"
      - "materials"
      - "--id-field"
      - "mat_no"
      - "--query"
      - "material"
      - "--on-error"
      - "lenient"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/morphis
    volumes:
      - ./pgx/config.toml:/root/.pgx/config.toml
      - ./pgx/schema:/root/.pgx/schema
      - ./pgx/queries:/root/.pgx/queries
    depends_on:
      db:
        condition: service_healthy
      es:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  tests:
    image: tests:local
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      app:
        condition: service_started
      es:
        condition: service_healthy
    profiles:
      - tests

  benchmark:
    image: tests:local
    build:
      context: .
      dockerfile: tests/Dockerfile
    entrypoint: ["/benchmark/run.sh"]
    depends_on:
      app:
        condition: service_started
      es:
        condition: service_healthy
      pgx-listen:
        condition: service_started
    environment:
      DATA_SIZE: "${BENCH_DATA_SIZE:-500}"
      ITERATIONS: "${BENCH_ITERATIONS:-30}"
      WARMUP: "${BENCH_WARMUP:-3}"
      ES_HOST: es
      ES_PORT: "9200"
      ES_USER: elastic
      ES_PASS: morphis_es_pass
    profiles:
      - benchmark
